<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CT30 Advisor — Test Suite</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        background: #1e1e1e;
        color: #e0e0e0;
        font-family: "Segoe UI", system-ui, sans-serif;
        margin: 0;
        padding: 16px;
        font-size: 14px;
      }
      h1 {
        color: #68c8b2;
        font-size: 1.4rem;
        margin: 0 0 8px;
      }
      h2 {
        color: #9ad8c8;
        font-size: 1.1rem;
        margin: 16px 0 8px;
      }
      .toolbar {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin: 12px 0;
      }
      .toolbar button {
        background: #2d2d2d;
        color: #e0e0e0;
        border: 1px solid #444;
        padding: 8px 16px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.85rem;
      }
      .toolbar button:hover {
        background: #3a3a3a;
        border-color: #68c8b2;
      }
      .toolbar button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .summary {
        display: flex;
        gap: 24px;
        margin: 8px 0 16px;
        padding: 12px 16px;
        background: #252525;
        border-radius: 6px;
        border: 1px solid #333;
      }
      .summary .stat {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .summary .stat .num {
        font-size: 1.8rem;
        font-weight: 700;
      }
      .summary .stat .label {
        font-size: 0.75rem;
        color: #999;
        text-transform: uppercase;
      }
      .summary .stat.pass .num {
        color: #4caf50;
      }
      .summary .stat.fail .num {
        color: #f44336;
      }
      .summary .stat.skip .num {
        color: #ff9800;
      }
      .summary .stat.total .num {
        color: #68c8b2;
      }
      #output {
        background: #252525;
        border: 1px solid #333;
        border-radius: 6px;
        padding: 4px;
        max-height: 70vh;
        overflow-y: auto;
        font-family: "Cascadia Code", "Fira Code", monospace;
        font-size: 0.8rem;
      }
      .test-group {
        margin: 4px 0;
      }
      .test-group-header {
        padding: 6px 10px;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        background: #2a2a2a;
        border-radius: 4px;
        user-select: none;
      }
      .test-group-header:hover {
        background: #333;
      }
      .test-group-header .title {
        font-weight: 600;
      }
      .test-group-header .badge {
        font-size: 0.75rem;
        padding: 1px 8px;
        border-radius: 10px;
      }
      .test-group-header .badge.ok {
        background: #1b5e20;
        color: #a5d6a7;
      }
      .test-group-header .badge.fail {
        background: #b71c1c;
        color: #ef9a9a;
      }
      .test-group-body {
        padding: 4px 0 4px 16px;
        display: none;
      }
      .test-group-body.open {
        display: block;
      }
      .test-group-body .sub-header {
        font-size: 0.75rem;
        font-weight: 600;
        padding: 4px 6px;
        margin: 4px 0 2px;
        border-radius: 3px;
        display: inline-block;
      }
      .test-group-body .sub-header.pass {
        background: rgba(76, 175, 80, 0.12);
        color: #81c784;
      }
      .test-group-body .sub-header.fail {
        background: rgba(244, 67, 54, 0.12);
        color: #ef9a9a;
      }
      .test-group-body .sub-section {
        padding-left: 8px;
        border-left: 2px solid transparent;
        margin-bottom: 6px;
      }
      .test-group-body .sub-section.pass {
        border-left-color: rgba(76, 175, 80, 0.3);
      }
      .test-group-body .sub-section.fail {
        border-left-color: rgba(244, 67, 54, 0.3);
      }
      .test-group-body .sub-section:empty {
        display: none;
      }
      .test-group-body .sub-section:empty + .sub-section:empty {
        display: none;
      }
      .test-group-body .sub-section .sub-header:only-child {
        display: none;
      }
      .test-group-body .sub-section .test-row:first-child {
        margin-top: 2px;
      }
      .test-row {
        padding: 3px 8px;
        margin: 2px 0;
        border-radius: 3px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .test-row.pass {
        background: rgba(76, 175, 80, 0.08);
      }
      .test-row.fail {
        background: rgba(244, 67, 54, 0.1);
      }
      .test-row .test-name {
        flex: 1;
      }
      .test-row .test-result {
        font-weight: 600;
        font-size: 0.75rem;
      }
      .test-row .test-result.pass {
        color: #4caf50;
      }
      .test-row .test-result.fail {
        color: #f44336;
      }
      .test-detail {
        color: #aaa;
        font-size: 0.75rem;
        margin-top: 2px;
      }
      .test-detail ul {
        margin: 2px 0;
        padding-left: 16px;
      }
      .progress-bar {
        height: 3px;
        background: #333;
        border-radius: 2px;
        margin: 8px 0;
        overflow: hidden;
        display: none;
      }
      .progress-bar .fill {
        height: 100%;
        background: linear-gradient(90deg, #68c8b2, #4caf50);
        width: 0%;
        transition: width 0.3s;
      }
      .error-msg {
        color: #f44336;
        padding: 8px;
        background: rgba(244, 67, 54, 0.08);
        border-radius: 4px;
        margin: 8px 0;
      }
      pre {
        margin: 4px 0;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>CT30 Advisor — Test Suite Automatica</h1>
    <p style="color: #888; margin: 0 0 8px; font-size: 0.85rem">
      Verifica gli scenari MS, le regole di ammissibilità, i calcoli formula
      engine e i casi JSON caricabili.
    </p>

    <div class="toolbar">
      <button
        id="btn-run-ms"
        title="Esegue QaManager.runAllTests() sugli scenari MS-001..MS-021 (include Rules, Cross-Rule e canCalculate)"
      >
        Scenari MS
      </button>
      <button id="btn-run-formula" title="Test unitari del FormulaEngine">
        Formula Engine
      </button>
      <button id="btn-run-rules" title="Test unitari del RulesEngine">
        Rules Engine
      </button>
      <button id="btn-run-cross" title="Test unitari del CrossRuleEngine">
        Cross-Rule
      </button>
      <button id="btn-run-all" class="primary">Esegui TUTTI</button>
      <button id="btn-reset" style="margin-left: auto">Reset</button>
    </div>

    <div class="summary" id="summary">
      <div class="stat total">
        <span class="num" id="stat-total">0</span
        ><span class="label">Totali</span>
      </div>
      <div class="stat pass">
        <span class="num" id="stat-pass">0</span
        ><span class="label">Passati</span>
      </div>
      <div class="stat fail">
        <span class="num" id="stat-fail">0</span
        ><span class="label">Falliti</span>
      </div>
    </div>

    <div class="progress-bar" id="progress-bar">
      <div class="fill" id="progress-fill"></div>
    </div>

    <div id="output"></div>

    <script type="module">
      "use strict";

      var el = function (id) {
        return document.getElementById(id);
      };
      var out = el("output");
      var statTotal = el("stat-total");
      var statPass = el("stat-pass");
      var statFail = el("stat-fail");
      var progressBar = el("progress-bar");
      var progressFill = el("progress-fill");

      var testCount = 0;
      var passCount = 0;
      var failCount = 0;

      var _updateStats = function () {
        statTotal.textContent = testCount;
        statPass.textContent = passCount;
        statFail.textContent = failCount;
      };

      var _showProgress = function (pct) {
        progressBar.style.display = "block";
        progressFill.style.width = pct + "%";
      };

      var _hideProgress = function () {
        progressBar.style.display = "none";
        progressFill.style.width = "0%";
      };

      var _makeGroup = function (title, id) {
        var div = document.createElement("div");
        div.className = "test-group";
        div.id = "group-" + id;
        div.innerHTML =
          '<div class="test-group-header" data-target="body-' +
          id +
          '">' +
          '<span class="title">' +
          title +
          "</span>" +
          '<span class="badge" id="badge-' +
          id +
          '">0</span>' +
          "</div>" +
          '<div class="test-group-body" id="body-' +
          id +
          '">' +
          '<div class="sub-section pass" id="pass-' +
          id +
          '">' +
          '<div class="sub-header pass">Passati</div></div>' +
          '<div class="sub-section fail" id="fail-' +
          id +
          '">' +
          '<div class="sub-header fail">Falliti</div></div>' +
          "</div>";
        out.appendChild(div);
        div.querySelector(".test-group-header").onclick = function (e) {
          var targetId = e.currentTarget.getAttribute("data-target");
          var body = document.getElementById(targetId);
          body.classList.toggle("open");
        };
        return {
          body: el("body-" + id),
          badge: el("badge-" + id),
          passBody: el("pass-" + id),
          failBody: el("fail-" + id),
        };
      };

      var _addTestRow = function (parent, name, passed, detailArr) {
        var target = passed ? parent.passBody : parent.failBody;
        var row = document.createElement("div");
        row.className = "test-row " + (passed ? "pass" : "fail");
        var n = testCount;
        row.innerHTML =
          '<span class="test-name">' +
          name +
          "</span>" +
          '<span class="test-result ' +
          (passed ? "pass" : "fail") +
          '">' +
          (passed ? "OK" : "FAIL") +
          "</span>";
        target.appendChild(row);

        if (detailArr && detailArr.length > 0) {
          var dd = document.createElement("div");
          dd.className = "test-detail";
          var ul = document.createElement("ul");
          detailArr.forEach(function (d) {
            var li = document.createElement("li");
            li.textContent = d;
            ul.appendChild(li);
          });
          dd.appendChild(ul);
          target.appendChild(dd);
        }

        testCount = testCount + 1;
        if (passed) {
          passCount = passCount + 1;
        } else {
          failCount = failCount + 1;
        }
        var passRows = parent.passBody.querySelectorAll(".test-row").length;
        var failRows = parent.failBody.querySelectorAll(".test-row").length;
        var totalRows = passRows + failRows;
        parent.badge.textContent = passRows + "/" + failRows + " OK/FAIL";
        if (failRows > 0) {
          parent.badge.className = "badge fail";
        } else {
          parent.badge.className = "badge ok";
        }
        _updateStats();
        return { passed: passed, detail: detailArr };
      };

      var _resetGroupCounts = function () {
        var groups = out.querySelectorAll(".test-group");
        groups.forEach(function (g) {
          var badge = g.querySelector(".badge[id]");
          if (badge) badge.textContent = "0";
        });
      };

      var _clearOutput = function () {
        out.innerHTML = "";
        testCount = 0;
        passCount = 0;
        failCount = 0;
        _updateStats();
        _hideProgress();
      };

      /* ========= MODULE LOADER (cache-proof: fetch + Blob URL) ========= */
      var _baseHref = document.baseURI || location.href;
      var _modDir = function (url) {
        return url.substring(0, url.lastIndexOf("/") + 1);
      };
      var _bustNum = 0;
      var _cacheBustImport = async function (relPath) {
        _bustNum++;
        var baseUrl = new URL(".", _baseHref).href;
        var fullUrl = new URL(relPath, baseUrl).href;
        var t = Date.now() + "-" + _bustNum + "-" + Math.random();
        var bustUrl = fullUrl + "?t=" + t;
        var resp = await fetch(bustUrl);
        if (!resp.ok) throw new Error("Fetch " + bustUrl + " → " + resp.status);
        var src = await resp.text();
        var dir = _modDir(fullUrl);
        src = src.replace(/from\s+["']\.\/([^"']+?)["']/g, function (m, imp) {
          return (
            'from "' +
            dir +
            imp +
            "?t=" +
            Date.now() +
            "-" +
            _bustNum +
            "-" +
            Math.random() +
            '"'
          );
        });
        return await import(
          URL.createObjectURL(new Blob([src], { type: "text/javascript" }))
        );
      };

      /* ========= IMPORTS ========= */
      var engines = null;
      var _feDiag = {};

      try {
        var m = await _cacheBustImport("../js/core/qa_manager.js");
        var QaManager = m.QaManager;
        var mR = await _cacheBustImport("../js/core/rules_engine.js");
        var RulesEngine = mR.RulesEngine;
        var mF = await _cacheBustImport("../js/core/formula_engine.js");
        var FormulaEngine = mF.FormulaEngine;
        var mC = await _cacheBustImport("../js/core/cross_rule_engine.js");
        var CrossRuleEngine = mC.CrossRuleEngine;
        var mN = await _cacheBustImport("../js/core/normativa.js");
        var RULES = mN.RULES;
        var TEST_SCENARIOS = mN.TEST_SCENARIOS;
        var INTERVENTI = mN.INTERVENTI;
        var FORMULE_INCENTIVO = mN.FORMULE_INCENTIVO;
        var SCHEDE_TECNICHE = mN.SCHEDE_TECNICHE;
        var PREMIALITA_CONFIG = mN.PREMIALITA_CONFIG;
        var OBBLIGO_MANTENIMENTO_ANNI = mN.OBBLIGO_MANTENIMENTO_ANNI;
        var TERMINI_CONFIG = mN.TERMINI_CONFIG;
        var PROCEDURA_CONFIG = mN.PROCEDURA_CONFIG;
        engines = {
          QaManager: QaManager,
          RulesEngine: RulesEngine,
          FormulaEngine: FormulaEngine,
          CrossRuleEngine: CrossRuleEngine,
          RULES: RULES,
          TEST_SCENARIOS: TEST_SCENARIOS,
          INTERVENTI: INTERVENTI,
          FORMULE_INCENTIVO: FORMULE_INCENTIVO,
          SCHEDE_TECNICHE: SCHEDE_TECNICHE,
          PREMIALITA_CONFIG: PREMIALITA_CONFIG,
          OBBLIGO_MANTENIMENTO_ANNI: OBBLIGO_MANTENIMENTO_ANNI,
          TERMINI_CONFIG: TERMINI_CONFIG,
          PROCEDURA_CONFIG: PROCEDURA_CONFIG,
          NORMATIVA_VERSION: mN.NORMATIVA_VERSION,
          SOGGETTI_CONFIG: mN.SOGGETTI_CONFIG,
          FE_VERSION: mF.FormulaEngine._version,
          FE_FEATURES: mF.FormulaEngine._features,
        };
        /* Diagnostic: fetch formula_engine.js raw from disk */
        try {
          var baseUrl = new URL(".", _baseHref).href;
          var feUrl =
            new URL("../js/core/formula_engine.js", baseUrl).href +
            "?t=" +
            Date.now() +
            Math.random();
          var _resp = await fetch(feUrl);
          var _txt = await _resp.text();
          _feDiag = {
            length: _txt.length,
            hasCondensa: _txt.indexOf("condensa") !== -1,
            hasCmaxMaggiorazione: _txt.indexOf("1.3") !== -1,
          };
        } catch (e) {
          _feDiag = { error: e.message };
        }
      } catch (e) {
        var errDiv = document.createElement("div");
        errDiv.className = "error-msg";
        errDiv.textContent = "ERRORE CARICAMENTO MODULI: " + e.message;
        out.appendChild(errDiv);
      }
      /* ========= /IMPORTS ========= */

      /* ========= 1. MS SCENARIOS ========= */
      var runMSScenarios = async function () {
        if (!engines) return;
        var grp = _makeGroup("1. Scenari MS (QaManager.runAllTests)", "ms");
        try {
          var report = engines.QaManager.runAllTests();
          var passed = 0;
          var failed = 0;
          report.results.forEach(function (r) {
            var p = r.success;
            if (p) {
              passed = passed + 1;
            } else {
              failed = failed + 1;
            }
            _addTestRow(grp, r.id + " — " + r.nome, p, r.dettagli);
          });
          grp.badge.textContent =
            passed + "/" + report.results.length + " OK, " + failed + " FAIL";
          if (failed > 0) {
            grp.badge.className = "badge fail";
          }
        } catch (e) {
          _addTestRow(grp, "QaManager.runAllTests() errore", false, [
            e.message,
          ]);
        }
      };

      /* ========= 2. FORMULA ENGINE TESTS ========= */
      var runFormulaTests = async function () {
        if (!engines) return;
        var grp = _makeGroup("2. Formula Engine — Test unitari", "formula");

        var calcIIA = function (fe, tipo, spesa, mq, soggetto) {
          return fe.calculate(
            "II.A",
            {
              tipo_superficie_opaca: tipo,
              costo_isolamento: spesa || 16000,
              superficie_isolata_mq: mq || 80,
            },
            { soggetto: soggetto || "Impresa", zonaClimatica: "Zona E" },
          );
        };

        var fe = engines.FormulaEngine;

        /* Test 2.0 — Version check: codice FormulaEngine aggiornato */
        try {
          var ver = fe._version;
          var feat = fe._features;
          var expectedVer = "v3-20260609";
          var hasFeatures =
            feat &&
            feat.hasCondensaWarning &&
            feat.hasCmaxMaggiorazione30 &&
            feat.hasHrZonale &&
            feat.hasAucSoggetto;
          var versionOk = ver === expectedVer;
          var diag = [];
          if (!versionOk)
            diag.push("Versione: " + ver + " (attesa " + expectedVer + ")");
          if (!hasFeatures) diag.push("Features: " + JSON.stringify(feat));
          var hasEtaMin = feat && feat.hasEtaMinPerTipo;
          if (!hasEtaMin) diag.push("hasEtaMinPerTipo mancante in features");
          _addTestRow(
            grp,
            "2.0 Version check: FormulaEngine aggiornato",
            versionOk && hasFeatures && hasEtaMin,
            diag,
          );
        } catch (e) {
          _addTestRow(grp, "2.0 Version check", false, [e.message]);
        }

        /* Test 2.0a — Verifica indexOf("Intern") matcha "Parete Interna" (fix radice comune) */
        try {
          var _findInt = "Parete Interna".indexOf("Intern");
          var _findCoper = "Coperture Interno".indexOf("Intern");
          var _findPav = "Pavimenti Interno".indexOf("Intern");
          _addTestRow(
            grp,
            "2.0a indexOf('Intern') su varianti interne -> OK",
            _findInt >= 0 && _findCoper >= 0 && _findPav >= 0,
            [
              "Parete Interna=" + _findInt,
              "Coperture Interno=" + _findCoper,
              "Pavimenti Interno=" + _findPav,
            ],
          );
        } catch (e) {
          _addTestRow(grp, "2.0a Diagnostica encoding", false, [e.message]);
        }

        /* Test 2.1 — II.A Parete Esterna: cmax=200, no warning condensa */
        try {
          var res = calcIIA(fe, "Parete Esterna");
          var cmaxOk = res.params.cmax === 200;
          var noWarn = !res.warnings || res.warnings.length === 0;
          _addTestRow(
            grp,
            "2.1 II.A Parete Esterna → cmax=200, no warning condensa",
            cmaxOk && noWarn,
            cmaxOk
              ? []
              : ["Atteso cmax=200, ottenuto " + res.params.cmax].concat(
                  noWarn
                    ? []
                    : ["Warning inaspettato: " + res.warnings.join(", ")],
                ),
          );
        } catch (e) {
          _addTestRow(grp, "2.1 II.A Parete Esterna → cmax=200", false, [
            e.message,
          ]);
        }

        var _warnCheck = function (res) {
          return (
            res.warnings &&
            res.warnings.length > 0 &&
            res.warnings[0].indexOf("condensa") !== -1
          );
        };

        /* Test 2.2 — II.A Parete Interna: cmax base 100 */
        try {
          var res = calcIIA(fe, "Parete Interna");
          _addTestRow(
            grp,
            "2.2 II.A Parete Interna → cmax ≥ 100",
            res.params.cmax >= 100,
            ["Atteso cmax≥100, ottenuto " + res.params.cmax],
          );
        } catch (e) {
          _addTestRow(grp, "2.2 II.A Parete Interna → cmax", false, [
            e.message,
          ]);
        }

        /* Test 2.3 — II.A Parete Interna: warning condensa UNI 13788 */
        try {
          var res = calcIIA(fe, "Parete Interna");
          var hasWarn = _warnCheck(res);
          var cmaxOk = res.params.cmax >= 130;
          var diagMsgs = [];
          if (!hasWarn)
            diagMsgs.push("Warnings: " + JSON.stringify(res.warnings));
          if (!cmaxOk)
            diagMsgs.push("cmax: " + res.params.cmax + " (atteso ≥130)");
          _addTestRow(
            grp,
            "2.3 II.A Parete Interna → cmax≥130 + warning condensa",
            hasWarn && cmaxOk,
            diagMsgs,
          );
        } catch (e) {
          _addTestRow(
            grp,
            "2.3 II.A Parete Interna → warning condensa",
            false,
            [e.message],
          );
        }

        /* Test 2.4 — II.A Coperture Interno: cmax base 150 */
        try {
          var res = calcIIA(fe, "Coperture Interno");
          _addTestRow(
            grp,
            "2.4 II.A Coperture Interno → cmax ≥ 150",
            res.params.cmax >= 150,
            ["Atteso cmax≥150, ottenuto " + res.params.cmax],
          );
        } catch (e) {
          _addTestRow(grp, "2.4 II.A Coperture Interno → cmax", false, [
            e.message,
          ]);
        }

        /* Test 2.5 — II.A Coperture Interno: warning condensa */
        try {
          var res = calcIIA(fe, "Coperture Interno");
          var hasWarn = _warnCheck(res);
          var info = !hasWarn ? " (assente — forse cache browser)" : "";
          _addTestRow(
            grp,
            "2.5 II.A Coperture Interno → warning condensa" + info,
            hasWarn,
            hasWarn ? [] : ["Warnings: " + JSON.stringify(res.warnings)],
          );
        } catch (e) {
          _addTestRow(
            grp,
            "2.5 II.A Coperture Interno → warning condensa",
            false,
            [e.message],
          );
        }

        /* Test 2.6 — II.A Pavimenti Interno: cmax base 150 */
        try {
          var res = calcIIA(fe, "Pavimenti Interno");
          _addTestRow(
            grp,
            "2.6 II.A Pavimenti Interno → cmax ≥ 150",
            res.params.cmax >= 150,
            ["Atteso cmax≥150, ottenuto " + res.params.cmax],
          );
        } catch (e) {
          _addTestRow(grp, "2.6 II.A Pavimenti Interno → cmax", false, [
            e.message,
          ]);
        }

        /* Test 2.7 — II.A Pavimenti Interno: warning condensa */
        try {
          var res = calcIIA(fe, "Pavimenti Interno");
          var hasWarn = _warnCheck(res);
          var info = !hasWarn ? " (assente — forse cache browser)" : "";
          _addTestRow(
            grp,

          var ok = g && g.perc === 0.65 && g.cmax === 5000 && g.imax === 100000;
          _addTestRow(

            "2.33 III.G cmax=5000 imax=100000 (Manuale)",

        /* Test 2.34 — η_s_min per PDC aria/aria ≤12kW = 149 (Manuale Tabella 3) */
        try {
          var calc = fe.calculate(

        } catch (e) {

        }

        /* Test 2.35 — η_s_min per PDC aria/aria >12kW = 137 (Manuale Tabella 3) */
        try {
          var calc = fe.calculate(
            "III.A",
            {
              tipologia_pdc: "aria/aria",
              potenza_pdc_kw: 20,
              scop: 4.0,
              eta_s: 160,
            },
            { soggetto: "Privato residenziale", zonaClimatica: "Zona E" },

          _addTestRow(

        } catch (e) {
          _addTestRow(grp, "2.35 η_s_min aria/aria >12kW", false, [e.message]);
        }

        /* Test 2.36 — η_s_min per PDC aria/acqua = 110 (Manuale Tabella 3) */
        try {
          var calc = fe.calculate(
            "III.A",
            {
              tipologia_pdc: "aria/acqua",
              potenza_pdc_kw: 10,
              scop: 4.5,
              eta_s: 150,
            },
            { soggetto: "Privato residenziale", zonaClimatica: "Zona E" },
          );
          _addTestRow(
            grp,
            "2.36 η_s_min aria/acqua = 110 (Tabella 3)",
            calc.params.eta_s_min_ecodesign === 110,
            ["Atteso 110, ottenuto " + calc.params.eta_s_min_ecodesign],
          );
        } catch (e) {
          _addTestRow(grp, "2.36 η_s_min aria/acqua", false, [e.message]);
        }

        /* Test 2.37 — η_s_min per PDC acqua/aria = 137 (Manuale Tabella 4) */
        try {
          var calc = fe.calculate(
            "III.A",
            {
              tipologia_pdc: "acqua/aria",
              potenza_pdc_kw: 15,
              scop: 5.0,
              eta_s: 170,
            },
            { soggetto: "Privato residenziale", zonaClimatica: "Zona E" },
          );
          _addTestRow(
            grp,
            "2.37 η_s_min acqua/aria = 137 (Tabella 4)",
            calc.params.eta_s_min_ecodesign === 137,
            ["Atteso 137, ottenuto " + calc.params.eta_s_min_ecodesign],
          );
        } catch (e) {
          _addTestRow(grp, "2.37 η_s_min acqua/aria", false, [e.message]);

        /* Test 2.38 — η_s_min per PDC acqua/acqua = 110 (Manuale Tabella 4) */
        try {
          var calc = fe.calculate(
            "III.A",
            {
              tipologia_pdc: "acqua/acqua",
              potenza_pdc_kw: 30,
              scop: 5.2,
              eta_s: 180,
            },
            { soggetto: "Privato residenziale", zonaClimatica: "Zona E" },

          _addTestRow(
            grp,
            "2.38 η_s_min acqua/acqua = 110 (Tabella 4)",
            calc.params.eta_s_min_ecodesign === 110,
            ["Atteso 110, ottenuto " + calc.params.eta_s_min_ecodesign],
          );
        } catch (e) {
          _addTestRow(grp, "2.38 η_s_min acqua/acqua", false, [e.message]);
        }

        /* Test 2.39 — η_s_min per PDC gas/acqua (Tabella 5) */
        try {
          var calc = fe.calculate(
            "III.A",
            {
              tipologia_pdc: "gas/acqua",
              potenza_pdc_kw: 50,
              scop: 1.6,
              eta_s: 130,
              eta_s_min_ecodesign: 110,
            },
            { soggetto: "Privato residenziale", zonaClimatica: "Zona E" },
          );
          _addTestRow(
            grp,
            "2.39 η_s_min gas/acqua = 110 (Tabella 5)",
            calc.params.eta_s_min_ecodesign === 110,
            ["Atteso 110, ottenuto " + calc.params.eta_s_min_ecodesign],
          );
        } catch (e) {
          _addTestRow(grp, "2.39 η_s_min gas/acqua", false, [e.message]);
        }

        /* Test 2.40 — h_r zonali per III.C biomassa (Tabella 11 = Q_uf per zona) */
        try {
          var calcZonaE = fe.calculate(
            "III.C",
            {
              potenza_nominale_kw: 25,
              classe_emissiva: "5 stelle",
              tipo_generatore: "Caldaia",
              riduzione_pp: "≤20%",
              costo_biomassa: 15000,
            },
            { soggetto: "Privato residenziale", zonaClimatica: "Zona E" },
          );
          var calcZonaA = fe.calculate(
            "III.C",
            {
              potenza_nominale_kw: 25,
              classe_emissiva: "5 stelle",
              tipo_generatore: "Caldaia",
              riduzione_pp: "≤20%",
              costo_biomassa: 15000,
            },
            { soggetto: "Privato residenziale", zonaClimatica: "Zona A" },
          );
          var hrE = calcZonaE.params.ore_funzionamento_annue;
          var hrA = calcZonaA.params.ore_funzionamento_annue;

          _addTestRow(
            grp,
            "2.40 h_r zonali (Tabella 11): Zona E=1700, Zona A=600",
            ok,
            ok
              ? []

                  "Zona E hr=" +

          _addTestRow(
            grp,
            "2.41 AUC in SOGGETTI_CONFIG",
            ok,
            ok ? [] : ["AUC non trovato: " + JSON.stringify(aucConfig)],

        try {

          _addTestRow(
            grp,
            "2.42 NORMATIVA_VERSION = v2-20260615",
            verNorm === "v2-20260615",
            verNorm !== "v2-20260615" ? ["Versione: " + verNorm] : [],
          );
        } catch (e) {
          _addTestRow(grp, "2.42 NORMATIVA_VERSION", false, [e.message]);
        }

        /* Valutazione complessiva */
        var groupRows = grp.body.querySelectorAll(".test-row");
        var okCount = 0;
        var failCountG = 0;
        groupRows.forEach(function (r) {
          if (r.classList.contains("pass")) okCount = okCount + 1;
          else failCountG = failCountG + 1;
        });
        grp.badge.textContent =
          okCount +
          "/" +
          (okCount + failCountG) +
          " OK, " +
          failCountG +
          " FAIL";
        if (failCountG > 0) grp.badge.className = "badge fail";
        else grp.badge.className = "badge ok";
      };

      /* ========= 3. RULES ENGINE TESTS ========= */
      var runRulesTests = async function () {
        if (!engines) return;
        var grp = _makeGroup("3. Rules Engine — Test unitari", "rules");

        /* Test 3.1 — validateAmmissibilita: soggetto valido */
        try {
          var re = engines.RulesEngine;
          var res = re.validateAmmissibilita({
            subjectType: "Pubblica Amministrazione",
            category: "B/1",
            buildingStatus: "esistente",
            selectedInterventi: ["III.A"],
          });
          _addTestRow(
            grp,
            "3.1 PA con III.A → ammissibile",
            res.success,
            res.success ? [] : res.errors,
          );
        } catch (e) {
          _addTestRow(grp, "3.1 PA con III.A → ammissibile", false, [
            e.message,
          ]);
        }

        /* Test 3.2 — validateAmmissibilita: edificio nuovo → blocco */
        try {
          var re = engines.RulesEngine;
          var res = re.validateAmmissibilita({
            subjectType: "Privato residenziale",
            category: "A/2",
            buildingStatus: "nuovo",
            selectedInterventi: ["III.A"],
          });
          _addTestRow(
            grp,
            "3.2 Edificio nuovo → blocco",
            !res.success,
            !res.success
              ? []
              : ["Atteso blocco per edificio nuovo, ma validazione passata"],
          );
        } catch (e) {
          _addTestRow(grp, "3.2 Edificio nuovo → blocco", false, [e.message]);
        }

        /* Test 3.3 — III.G getInterventoCompatibility */
        try {
          var re = engines.RulesEngine;
          var compat = re.getInterventoCompatibility("III.G", ["III"]);
          _addTestRow(
            grp,
            "3.3 III.G compatibile con Titolo III",
            compat.isCompatible,
            compat.isCompatible ? [] : [compat.reason],
          );
        } catch (e) {
          _addTestRow(grp, "3.3 III.G compatibile con Titolo III", false, [
            e.message,
          ]);
        }

        /* Test 3.4 — II.G non compatibile con Titolo II */
        try {
          var re = engines.RulesEngine;
          var compat = re.getInterventoCompatibility("II.G", ["III"]);
          _addTestRow(
            grp,
            "3.4 II.G NON compatibile con Titolo III",
            !compat.isCompatible,
            !compat.isCompatible
              ? []
              : ["Atteso incompatibile, ma risultato compatibile"],
          );
        } catch (e) {
          _addTestRow(grp, "3.4 II.G NON compatibile con Titolo III", false, [
            e.message,
          ]);
        }

        /* Test 3.5 — isSubjectCompatible PA → Titolo II */
        try {
          var re = engines.RulesEngine;
          var compat = re.isSubjectCompatible("Pubblica Amministrazione", "II");
          var compat3 = re.isSubjectCompatible(
            "Pubblica Amministrazione",
            "III",
          );
          _addTestRow(
            grp,
            "3.5 PA compatibile con Titolo II e III",
            compat && compat3,
            !compat
              ? ["PA non compatibile con Titolo II"]
              : ["PA non compatibile con Titolo III"],
          );
        } catch (e) {
          _addTestRow(grp, "3.5 PA compatibile con Titolo II e III", false, [
            e.message,
          ]);
        }

        /* Test 3.6 — III.D solare termico senza impianto esistente (MS-010) */
        try {
          var re = engines.RulesEngine;
          var res = re.validateAmmissibilita({
            subjectType: "Privato residenziale",
            category: "A/2",
            buildingStatus: "esistente",
            selectedInterventi: ["III.D"],
          });
          _addTestRow(
            grp,
            "3.6 III.D senza impianto esistente → ammissibile",
            res.success,
            res.success ? [] : res.errors,
          );
        } catch (e) {
          _addTestRow(
            grp,
            "3.6 III.D senza impianto esistente → ammissibile",
            false,
            [e.message],
          );
        }

        /* Test 3.7 — Impresa require richiesta preliminare */
        try {
          var re = engines.RulesEngine;
          var res = re.validateAmmissibilita({
            subjectType: "Impresa",
            category: "D/7",
            buildingStatus: "esistente",
            selectedInterventi: ["III.A"],
            richiestaPreliminareInviata: false,
          });
          _addTestRow(
            grp,
            "3.7 Impresa senza preliminare → blocco",
            !res.success,
            !res.success ? [] : ["Atteso blocco, ma validazione passata"],
          );
        } catch (e) {
          _addTestRow(grp, "3.7 Impresa senza preliminare → blocco", false, [
            e.message,
          ]);
        }

        /* Test 3.8 — isSubjectCompatible Condominio → Titolo II bloccato */
        try {
          var re = engines.RulesEngine;
          var compatII = re.isSubjectCompatible("Condominio", "II");
          var compatIII = re.isSubjectCompatible("Condominio", "III");
          _addTestRow(
            grp,
            "3.8 Condominio: Titolo II=blocco, Titolo III=OK",
            !compatII && compatIII,
            [
              !compatII
                ? ""
                : "Condominio compatibile con Titolo II (atteso blocco)",
              !compatIII
                ? "Condominio NON compatibile con Titolo III (atteso OK)"
                : "",
            ].filter(function (x) {
              return x;
            }),
          );
        } catch (e) {
          _addTestRow(grp, "3.8 Condominio Titolo II bloccato", false, [
            e.message,
          ]);
        }

        /* Test 3.9 — isSubjectCompatible Privato residenziale → Titolo II bloccato */
        try {
          var re = engines.RulesEngine;
          var compatII = re.isSubjectCompatible("Privato residenziale", "II");
          var compatIII = re.isSubjectCompatible("Privato residenziale", "III");
          _addTestRow(
            grp,
            "3.9 Privato residenziale: Titolo II=blocco, Titolo III=OK",
            !compatII && compatIII,
            [
              !compatII
                ? ""
                : "Privato res. compatibile con Titolo II (atteso blocco)",
              !compatIII
                ? "Privato res. NON compatibile con Titolo III (atteso OK)"
                : "",
            ].filter(function (x) {
              return x;
            }),
          );
        } catch (e) {
          _addTestRow(
            grp,
            "3.9 Privato residenziale Titolo II bloccato",
            false,
            [e.message],
          );
        }

        /* Valutazione complessiva */
        var groupRows = grp.body.querySelectorAll(".test-row");
        var okCount = 0;
        var failCountG = 0;
        groupRows.forEach(function (r) {
          if (r.classList.contains("pass")) okCount = okCount + 1;
          else failCountG = failCountG + 1;
        });
        grp.badge.textContent =
          okCount +
          "/" +
          (okCount + failCountG) +
          " OK, " +
          failCountG +
          " FAIL";
        if (failCountG > 0) grp.badge.className = "badge fail";
        else grp.badge.className = "badge ok";
      };

      /* ========= 4. CROSS-RULE ENGINE TESTS ========= */
      var runCrossTests = async function () {
        if (!engines) return;
        var grp = _makeGroup("4. Cross-Rule Engine — Test unitari", "cross");

        /* Test 4.1 — III.A + III.C mutualmente esclusivi */
        try {
          var cr = engines.CrossRuleEngine;
          var res = cr.validateSelection(["III.A", "III.C"]);
          _addTestRow(
            grp,
            "4.1 III.A + III.C → blocco (mutualmente esclusivi)",
            !res.success,
            !res.success
              ? []
              : [
                  "Atteso blocco, validazione passata: " +
                    (res.errors || []).join("; "),
                ],
          );
        } catch (e) {
          _addTestRow(grp, "4.1 III.A + III.C → blocco", false, [e.message]);
        }

        /* Test 4.2 — III.B + III.F mutualmente esclusivi */
        try {
          var cr = engines.CrossRuleEngine;
          var res = cr.validateSelection(["III.B", "III.F"]);
          _addTestRow(
            grp,
            "4.2 III.B + III.F → blocco (mutualmente esclusivi)",
            !res.success,
            !res.success ? [] : ["Atteso blocco, validazione passata"],
          );
        } catch (e) {
          _addTestRow(grp, "4.2 III.B + III.F → blocco", false, [e.message]);
        }

        /* Test 4.3 — II.H senza III.A → blocco (paired) */
        try {
          var cr = engines.CrossRuleEngine;
          var res = cr.validateSelection(["II.H"]);
          _addTestRow(
            grp,
            "4.3 II.H senza III.A → blocco (paired)",
            !res.success,
            !res.success ? [] : ["Atteso blocco per pairing mancante"],
          );
        } catch (e) {
          _addTestRow(grp, "4.3 II.H senza III.A → blocco", false, [e.message]);
        }

        /* Test 4.4 — II.H + III.A → OK (paired rispettato) */
        try {
          var cr = engines.CrossRuleEngine;
          var res = cr.validateSelection(["III.A", "II.H"]);
          _addTestRow(
            grp,
            "4.4 III.A + II.H → OK (pairing rispettato)",
            res.success,
            res.success ? [] : res.errors,
          );
        } catch (e) {
          _addTestRow(grp, "4.4 III.A + II.H → OK", false, [e.message]);
        }

        /* Test 4.5 — III.A + III.G → OK (multi-intervento Titolo III) */
        try {
          var cr = engines.CrossRuleEngine;
          var res = cr.validateSelection(["III.A", "III.G"]);
          _addTestRow(
            grp,
            "4.5 III.A + III.G → OK (multi Titolo III)",
            res.success,
            res.success ? [] : res.errors,
          );
        } catch (e) {
          _addTestRow(grp, "4.5 III.A + III.G → OK", false, [e.message]);
        }

        /* Test 4.6 — II.C senza II.B → blocco (paired) */
        try {
          var cr = engines.CrossRuleEngine;
          var res = cr.validateSelection(["II.C"]);
          _addTestRow(
            grp,
            "4.6 II.C senza II.B → blocco (schermature richiedono infissi)",
            !res.success,
            !res.success ? [] : ["Atteso blocco per pairing mancante"],
          );
        } catch (e) {
          _addTestRow(grp, "4.6 II.C senza II.B → blocco", false, [e.message]);
        }

        /* Valutazione complessiva */
        var groupRows = grp.body.querySelectorAll(".test-row");
        var okCount = 0;
        var failCountG = 0;
        groupRows.forEach(function (r) {
          if (r.classList.contains("pass")) okCount = okCount + 1;
          else failCountG = failCountG + 1;
        });
        grp.badge.textContent =
          okCount +
          "/" +
          (okCount + failCountG) +
          " OK, " +
          failCountG +
          " FAIL";
        if (failCountG > 0) grp.badge.className = "badge fail";
        else grp.badge.className = "badge ok";
      };

      /* ========= EVENT BINDINGS ========= */
      el("btn-run-ms").onclick = function () {
        _clearOutput();
        runMSScenarios();
      };
      el("btn-run-formula").onclick = function () {
        _clearOutput();
        runFormulaTests();
      };
      el("btn-run-rules").onclick = function () {
        _clearOutput();
        runRulesTests();
      };
      el("btn-run-cross").onclick = function () {
        _clearOutput();
        runCrossTests();
      };
      el("btn-run-all").onclick = async function () {
        _clearOutput();
        var btns = [
          "btn-run-ms",
          "btn-run-formula",
          "btn-run-rules",
          "btn-run-cross",
          "btn-run-all",
          "btn-reset",
        ];
        btns.forEach(function (b) {
          el(b).disabled = true;
        });
        try {
          await runMSScenarios();
          await runFormulaTests();
          await runRulesTests();
          await runCrossTests();
        } finally {
          btns.forEach(function (b) {
            el(b).disabled = false;
          });
        }
      };
      el("btn-reset").onclick = function () {
        _clearOutput();
      };

      /* Carica messaggio iniziale */
      if (!engines) {
        var errDiv = document.createElement("div");
        errDiv.className = "error-msg";
        errDiv.innerHTML =
          "Moduli non caricati. Prova ad aprire questa pagina con un server HTTP locale:<br>" +
          "<pre>python3 -m http.server 8080 --directory " +
          window.location.pathname.split("/test/")[0] +
          "</pre>" +
          "Poi apri http://localhost:8080/test/test_suite.html";
        out.appendChild(errDiv);
      } else {
        var info = document.createElement("div");
        info.style.cssText = "color:#666;font-size:0.85rem;padding:12px;";
        info.innerHTML =
          "Premi uno dei pulsanti sopra per avviare i test." +
          '<br><span style="font-size:0.75rem;color:#888;">' +
          "Nota: se i moduli JS sono in cache, fai Ctrl+F5 (hard refresh) per ricaricarli.</span>";
        out.appendChild(info);
      }
    </script>
  </body>
