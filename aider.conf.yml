##############################################
# .aider.conf.yml — Configurazione progetto CT30
##############################################

# Modello LLM
#model: openrouter/openrouter/free

# Interfaccia
dark-mode: true
pretty: true
stream: true

# Git — commit manuali per maggiore controllo
auto-commits: false
dirty-commits: false

# History files — tutto raggruppato in .aider/
input-history-file: .aider/.aider.input.history
chat-history-file: .aider/.aider.chat.history.md
llm-history-file: .aider/.aider.llm.history

# File di contesto\ (read-only, caricati automaticamente)
read:
  - GEMINI.md
  - CONTESTO.md
  - PIANO_ADEGUAMENTO*.md
  - PIANO_AGGIORNATO*.md
  - CRONOLOGIA*.md
  - news_guide/**
  - news_docs/**
  - news_best/**
  - news_db/**

  file:
  - static/**

# Repo map
#map-tokens: 4096
map-refresh: auto
